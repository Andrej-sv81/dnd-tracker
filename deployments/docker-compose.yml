services:
  backend:
    build: ../backend
    container_name: dnd-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db
    
  db:
    image: postgres:15
    container_name: dnd-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  